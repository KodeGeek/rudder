# Prometheus scrape config for the bundled Rudder stack.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  # Short-lived Ansible cron jobs push their metrics to the Pushgateway;
  # honor_labels keeps the job's own `task=...` label intact.
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]

  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
