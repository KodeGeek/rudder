# Apply the base stack:   kubectl apply -k deploy/k8s
# Tear down:              kubectl delete -k deploy/k8s
#
# The base is secret-free and has no cross-component hard dependencies:
# web-ui (demo mode) + prometheus + loki, each its own Deployment/Service.
#
# Opt-in components (each its own independently-updatable container):
#   • vault          — create the secret first, then uncomment 20-vault.yaml:
#       kubectl -n rudder create secret generic vault-dev \
#         --from-literal=root-token="$(openssl rand -hex 16)"
#   • control-plane  — Phase 2; build the image, then uncomment 50-control-plane.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rudder

labels:
  - pairs:
      app.kubernetes.io/part-of: rudder
    includeSelectors: false

resources:
  - 00-namespace.yaml
  - 10-web-ui.yaml
  - 30-prometheus.yaml
  - 40-loki.yaml
  # - 20-vault.yaml          # uncomment after creating the vault-dev secret (see above)
  # - 50-control-plane.yaml  # uncomment when the control-plane image is ready (Phase 2)
