# ── Control plane — reconcile loop + job runner + API ──
# Pulls SSH keys/secrets from Vault, renders the Git manifest → cron, runs
# Ansible, and pushes metrics + logs. Uses the hardened Vault's published root
# token (VAULT_TOKEN_FILE on the shared PVC) — no dev-mode Secret.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cp-work               # repo registrations (repos.json) + cloned repos + run state
  namespace: rudder
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests: { storage: 2Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: rudder
  labels: { app.kubernetes.io/name: control-plane }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: control-plane }
  strategy: { type: Recreate }     # shares the RWO vault-shared PVC with the vault pod
  template:
    metadata:
      labels: { app.kubernetes.io/name: control-plane }
    spec:
      terminationGracePeriodSeconds: 40    # let in-flight runs drain on SIGTERM
      containers:
        - name: control-plane
          image: rudder-control-plane:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
          lifecycle:
            preStop:
              exec: { command: ["sleep", "3"] }   # stop taking traffic before SIGTERM
          env:
            - name: VAULT_ADDR
              value: "http://vault:8200"
            - name: VAULT_TOKEN_FILE          # root token published by the unseal sidecar
              value: "/vault-shared/root-token"
            - name: VAULT_KV_MOUNT
              value: "secret"
            - name: PUSHGATEWAY_URL
              value: "http://pushgateway:9091"
            - name: LOKI_URL
              value: "http://loki:3100"
            - name: GITEA_SEED                 # no bundled Gitea on k8s; skip demo seeding
              value: "false"
            - name: RECONCILE_INTERVAL
              value: "15m"
          startupProbe:                          # allow slow first boot (Vault unseal)
            httpGet: { path: /readyz, port: 8090 }
            periodSeconds: 5
            failureThreshold: 36                 # up to 3 min to become ready
          readinessProbe:
            httpGet: { path: /readyz, port: 8090 }
            periodSeconds: 15
          livenessProbe:                         # restart only if the process is wedged
            httpGet: { path: /healthz, port: 8090 }
            periodSeconds: 20
            failureThreshold: 3
          volumeMounts:
            - { name: vault-shared, mountPath: /vault-shared, readOnly: true }
            - { name: cp-work, mountPath: /app/work }
            # Read-only host /proc + root fs so /host-stats reports node (host20)
            # CPU/memory/disk for the Overview dashboard.
            - { name: host-proc, mountPath: /host/proc, readOnly: true }
            - { name: host-root, mountPath: /host/root, readOnly: true }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "1", memory: "512Mi" }
      volumes:
        - name: vault-shared
          persistentVolumeClaim: { claimName: vault-shared }
        - name: cp-work
          persistentVolumeClaim: { claimName: cp-work }
        - name: host-proc
          hostPath: { path: /proc }
        - name: host-root
          hostPath: { path: / }
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: rudder
spec:
  selector: { app.kubernetes.io/name: control-plane }
  ports:
    - port: 8090
      targetPort: 8090
