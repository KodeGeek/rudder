# ── Prometheus + Pushgateway ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rudder
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - /etc/prometheus/rudder-alerts.yml
    scrape_configs:
      - job_name: pushgateway
        honor_labels: true
        static_configs:
          - targets: ["pushgateway:9091"]
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: control-plane          # Rudder's own self-metrics (/metrics)
        static_configs:
          - targets: ["control-plane:8090"]
  rudder-alerts.yml: |
    groups:
      - name: rudder
        rules:
          - alert: RudderControlPlaneDown
            expr: up{job="control-plane"} == 0
            for: 5m
            labels: { severity: critical }
            annotations: { summary: "Rudder control-plane is not scrapeable" }
          - alert: RudderVaultDown
            expr: rudder_vault_up == 0
            for: 5m
            labels: { severity: critical }
            annotations: { summary: "Vault is unreachable or sealed" }
          - alert: RudderReconcileStalled
            expr: time() - rudder_reconcile_last_timestamp_seconds > 3600
            for: 10m
            labels: { severity: warning }
            annotations: { summary: "No successful reconcile in over an hour" }
          - alert: RudderJobFailing
            expr: ansible_job_last_success == 0
            for: 5m
            labels: { severity: warning }
            annotations: { summary: "Job {{ $labels.task }} last run failed" }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: rudder
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests: { storage: 5Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: rudder
  labels: { app.kubernetes.io/name: prometheus }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: prometheus }
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app.kubernetes.io/name: prometheus }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus@sha256:69f5241418838263316593f7274a304b095c40bcf22e57272865da91bd60a8ac
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /-/healthy, port: 9090 }
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "1", memory: "1Gi" }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          persistentVolumeClaim: { claimName: prometheus-data }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: rudder
spec:
  selector: { app.kubernetes.io/name: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: rudder
  labels: { app.kubernetes.io/name: pushgateway }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: pushgateway }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pushgateway }
    spec:
      containers:
        - name: pushgateway
          image: prom/pushgateway@sha256:74fa117cef2d7e383112d25139ff1c2d2e309c35389a9e0554a47136a1482e48
          ports:
            - containerPort: 9091
          readinessProbe:
            httpGet: { path: /-/ready, port: 9091 }
            initialDelaySeconds: 3
            periodSeconds: 15
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: rudder
spec:
  selector: { app.kubernetes.io/name: pushgateway }
  ports:
    - port: 9091
      targetPort: 9091
