# ── Prometheus + Pushgateway ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: rudder
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: pushgateway
        honor_labels: true
        static_configs:
          - targets: ["pushgateway:9091"]
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: rudder
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests: { storage: 5Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: rudder
  labels: { app.kubernetes.io/name: prometheus }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: prometheus }
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app.kubernetes.io/name: prometheus }
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /-/healthy, port: 9090 }
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
          resources:
            requests: { cpu: "50m", memory: "256Mi" }
            limits:   { cpu: "1", memory: "1Gi" }
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          persistentVolumeClaim: { claimName: prometheus-data }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: rudder
spec:
  selector: { app.kubernetes.io/name: prometheus }
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  namespace: rudder
  labels: { app.kubernetes.io/name: pushgateway }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: pushgateway }
  template:
    metadata:
      labels: { app.kubernetes.io/name: pushgateway }
    spec:
      containers:
        - name: pushgateway
          image: prom/pushgateway:latest
          ports:
            - containerPort: 9091
          readinessProbe:
            httpGet: { path: /-/ready, port: 9091 }
            initialDelaySeconds: 3
            periodSeconds: 15
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  namespace: rudder
spec:
  selector: { app.kubernetes.io/name: pushgateway }
  ports:
    - port: 9091
      targetPort: 9091
