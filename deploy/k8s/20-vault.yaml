# ── Vault (OpenBao) — SSH keys + encrypted secrets for Ansible auth ──
# DEV MODE for demos only. In production run a real Vault/OpenBao with
# auto-unseal, persistent raft storage, and least-privilege policies.
#
# NO token value is committed. Create the Secret out-of-band BEFORE applying:
#
#   kubectl -n rudder create secret generic vault-dev \
#     --from-literal=root-token="$(openssl rand -hex 16)"
#
# Then uncomment 20-vault.yaml in kustomization.yaml.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vault-data
  namespace: rudder
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests: { storage: 1Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: rudder
  labels: { app.kubernetes.io/name: vault }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: vault }
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app.kubernetes.io/name: vault }
    spec:
      containers:
        - name: vault
          image: openbao/openbao:latest
          args: ["server", "-dev", "-dev-listen-address=0.0.0.0:8200"]
          env:
            - name: BAO_DEV_ROOT_TOKEN_ID
              valueFrom:
                secretKeyRef: { name: vault-dev, key: root-token }   # created out-of-band
          securityContext:
            capabilities:
              add: ["IPC_LOCK"]
          ports:
            - containerPort: 8200
          readinessProbe:
            httpGet: { path: /v1/sys/health, port: 8200 }
            initialDelaySeconds: 5
            periodSeconds: 15
          volumeMounts:
            - { name: data, mountPath: /openbao/file }
          resources:
            requests: { cpu: "20m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: vault-data }
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: rudder
spec:
  selector: { app.kubernetes.io/name: vault }
  ports:
    - port: 8200
      targetPort: 8200
