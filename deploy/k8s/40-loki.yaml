# ── Loki — run-log store for drill-down ──────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  namespace: rudder
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests: { storage: 5Gi }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: rudder
  labels: { app.kubernetes.io/name: loki }
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: loki }
  strategy: { type: Recreate }
  template:
    metadata:
      labels: { app.kubernetes.io/name: loki }
    spec:
      containers:
        - name: loki
          image: grafana/loki@sha256:191d4fdfb7264f16989f0a57f320872620a5a7c2ceeec6229212c4190ec49b86
          args: ["-config.file=/etc/loki/local-config.yaml"]
          ports:
            - containerPort: 3100
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - { name: data, mountPath: /loki }
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "1", memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: loki-data }
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: rudder
spec:
  selector: { app.kubernetes.io/name: loki }
  ports:
    - port: 3100
      targetPort: 3100
