# ── Rudder web-ui ───────────────────────────────────────────────
# Build & load the image first:
#   docker build -t rudder-web-ui:latest web-ui
#   # Docker Desktop K8s shares the local image store, so IfNotPresent works.
#   # For kind:  kind load docker-image rudder-web-ui:latest
#   # For a remote cluster: push to a registry and set the image path below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-config
  namespace: rudder
data:
  # Live: bind the UI to the in-cluster control-plane / Prometheus / Loki / Vault.
  # NOTE: use FQDNs — the nginx proxy resolves upstreams lazily via the cluster
  # resolver, which does NOT apply Kubernetes search domains, so bare service
  # names (e.g. "control-plane") fail to resolve. *.<ns>.svc.cluster.local works.
  DATA_SOURCE: "live"
  PROMETHEUS_URL: "http://prometheus.rudder.svc.cluster.local:9090"
  LOKI_URL: "http://loki.rudder.svc.cluster.local:3100"
  VAULT_URL: "http://vault.rudder.svc.cluster.local:8200"
  CONTROL_PLANE_URL: "http://control-plane.rudder.svc.cluster.local:8090"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: rudder
  labels: { app.kubernetes.io/name: web-ui }
spec:
  replicas: 2                       # stateless — scale freely
  selector:
    matchLabels: { app.kubernetes.io/name: web-ui }
  template:
    metadata:
      labels: { app.kubernetes.io/name: web-ui }
    spec:
      containers:
        - name: web-ui
          image: rudder-web-ui:latest      # ← replace with your registry path for remote clusters
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef: { name: web-ui-config }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests: { cpu: "10m", memory: "32Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui
  namespace: rudder
spec:
  # NodePort: reach the UI at http://<node-ip>:30080 (k3s Traefik ingress is
  # disabled in this deploy). Swap for an Ingress if you add a controller.
  type: NodePort
  selector: { app.kubernetes.io/name: web-ui }
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
