# ── Loki — run-log store for drill-down ──────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: loki-data
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: loki
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.loki }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: loki
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
      {{- include "rudder.selectorLabels" . | nindent 6 }}
  strategy: { type: Recreate }
  template:
    metadata:
      labels:
        {{- include "rudder.labels" . | nindent 8 }}
        app.kubernetes.io/name: loki
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: loki
          image: {{ .Values.loki.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["-config.file=/etc/loki/local-config.yaml"]
          ports:
            - containerPort: 3100
          readinessProbe:
            httpGet: { path: /ready, port: 3100 }
            initialDelaySeconds: 10
            periodSeconds: 15
          volumeMounts:
            - { name: data, mountPath: /loki }
          resources:
            {{- toYaml .Values.loki.resources | nindent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: loki-data }
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: loki
spec:
  selector:
    app.kubernetes.io/name: loki
  ports:
    - port: 3100
      targetPort: 3100
