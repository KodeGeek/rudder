# ── Prometheus + Pushgateway ─────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    rule_files:
      - /etc/prometheus/rudder-alerts.yml
    scrape_configs:
      - job_name: pushgateway
        honor_labels: true
        static_configs:
          - targets: ["pushgateway:9091"]
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]
      - job_name: control-plane          # Rudder's own self-metrics (/metrics)
        static_configs:
          - targets: ["control-plane:8090"]
  rudder-alerts.yml: |
    groups:
      - name: rudder
        rules:
          - alert: RudderControlPlaneDown
            expr: up{job="control-plane"} == 0
            for: 5m
            labels: { severity: critical }
            annotations: { summary: "Rudder control-plane is not scrapeable" }
          - alert: RudderVaultDown
            expr: rudder_vault_up == 0
            for: 5m
            labels: { severity: critical }
            annotations: { summary: "Vault is unreachable or sealed" }
          - alert: RudderReconcileStalled
            expr: time() - rudder_reconcile_last_timestamp_seconds > 3600
            for: 10m
            labels: { severity: warning }
            annotations: { summary: "No successful reconcile in over an hour" }
          - alert: RudderJobFailing
            expr: ansible_job_last_success == 0
            for: 5m
            labels: { severity: warning }
            annotations: { summary: "Job {{`{{ $labels.task }}`}} last run failed" }
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: prometheus
spec:
  accessModes: ["ReadWriteOnce"]
  {{- with .Values.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.prometheus }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
      {{- include "rudder.selectorLabels" . | nindent 6 }}
  strategy: { type: Recreate }
  template:
    metadata:
      labels:
        {{- include "rudder.labels" . | nindent 8 }}
        app.kubernetes.io/name: prometheus
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: prometheus
          image: {{ .Values.prometheus.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          readinessProbe:
            httpGet: { path: /-/ready, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /-/healthy, port: 9090 }
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - { name: config, mountPath: /etc/prometheus }
            - { name: data, mountPath: /prometheus }
          resources:
            {{- toYaml .Values.prometheus.resources | nindent 12 }}
      volumes:
        - name: config
          configMap: { name: prometheus-config }
        - name: data
          persistentVolumeClaim: { claimName: prometheus-data }
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: prometheus
spec:
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pushgateway
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: pushgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pushgateway
      {{- include "rudder.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rudder.labels" . | nindent 8 }}
        app.kubernetes.io/name: pushgateway
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pushgateway
          image: {{ .Values.pushgateway.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 9091
          readinessProbe:
            httpGet: { path: /-/ready, port: 9091 }
            initialDelaySeconds: 3
            periodSeconds: 15
          resources:
            {{- toYaml .Values.pushgateway.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: pushgateway
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: pushgateway
spec:
  selector:
    app.kubernetes.io/name: pushgateway
  ports:
    - port: 9091
      targetPort: 9091
