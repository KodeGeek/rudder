# ── Rudder web-ui ───────────────────────────────────────────────
# Stateless nginx UI + proxy. Cross-service upstream URLs use FQDNs scoped to
# the RELEASE NAMESPACE, because the nginx proxy resolves upstreams lazily via
# the cluster resolver, which does NOT apply Kubernetes search domains — so bare
# service names fail to resolve. *.<ns>.svc.cluster.local works.
apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-config
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: web-ui
data:
  DATA_SOURCE: {{ .Values.webUi.dataSource | quote }}
  PROMETHEUS_URL: "http://prometheus.{{ .Release.Namespace }}.svc.cluster.local:9090"
  LOKI_URL: "http://loki.{{ .Release.Namespace }}.svc.cluster.local:3100"
  VAULT_URL: "http://vault.{{ .Release.Namespace }}.svc.cluster.local:8200"
  CONTROL_PLANE_URL: "http://control-plane.{{ .Release.Namespace }}.svc.cluster.local:8090"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: web-ui
spec:
  replicas: {{ .Values.webUi.replicaCount }}  # stateless — scale freely
  selector:
    matchLabels:
      app.kubernetes.io/name: web-ui
      {{- include "rudder.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rudder.labels" . | nindent 8 }}
        app.kubernetes.io/name: web-ui
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web-ui
          image: {{ include "rudder.image" (dict "root" $ "component" .Values.webUi) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: web-ui-config
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            {{- toYaml .Values.webUi.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: web-ui
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: web-ui
spec:
  type: {{ .Values.webUi.service.type }}
  selector:
    app.kubernetes.io/name: web-ui
  ports:
    - port: {{ .Values.webUi.service.port }}
      targetPort: 80
      {{- if eq .Values.webUi.service.type "NodePort" }}
      nodePort: {{ .Values.webUi.service.nodePort }}
      {{- end }}
{{- if .Values.webUi.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web-ui
  labels:
    {{- include "rudder.labels" . | nindent 4 }}
    app.kubernetes.io/name: web-ui
  {{- with .Values.webUi.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.webUi.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.webUi.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.webUi.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.webUi.ingress.path }}
            pathType: {{ .Values.webUi.ingress.pathType }}
            backend:
              service:
                name: web-ui
                port:
                  number: {{ .Values.webUi.service.port }}
{{- end }}
