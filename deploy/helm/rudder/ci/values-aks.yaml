# Azure Kubernetes Service (AKS).
#   helm install rudder deploy/helm/rudder -n rudder --create-namespace \
#     -f deploy/helm/rudder/ci/values-aks.yaml \
#     --set controlPlane.apiKey.value=$(openssl rand -hex 24)
persistence:
  storageClassName: managed-csi        # Azure Disk (RWO). Use azurefile-csi for RWX.
webUi:
  service:
    type: LoadBalancer                 # Azure LB; or set ingress.enabled with AGIC/ingress-nginx
controlPlane:
  hostStats:
    enabled: false                     # hostPath off on managed/multi-node clusters
