# Amazon EKS.
#   helm install rudder deploy/helm/rudder -n rudder --create-namespace \
#     -f deploy/helm/rudder/ci/values-eks.yaml \
#     --set controlPlane.apiKey.value=$(openssl rand -hex 24)
# Requires the EBS CSI driver (gp3) installed on the cluster.
persistence:
  storageClassName: gp3
webUi:
  service:
    type: LoadBalancer                 # AWS NLB/CLB; or ingress.enabled with the AWS LB Controller
controlPlane:
  hostStats:
    enabled: false
