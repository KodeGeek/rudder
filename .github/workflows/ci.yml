name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: control-plane (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: control-plane
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: control-plane/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Byte-compile
        run: python -m py_compile app/*.py
      - name: Unit tests
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=60

  frontend:
    name: web-ui (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npx vite build
      - name: Test
        run: npm test

  helm:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Lint Helm chart
        run: helm lint --strict deploy/helm/rudder

  images:
    name: docker build (no push)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t rudder-control-plane:ci control-plane
      - run: docker build -t rudder-web-ui:ci web-ui

  secret-scan:
    name: secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Use the open-source gitleaks CLI directly. The gitleaks-action@v2 wrapper
      # requires a paid GITLEAKS_LICENSE for repos under a GitHub *organization*;
      # the CLI binary has no such restriction and still fails on any real leak.
      - name: gitleaks (secret scan)
        run: |
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          chmod +x gitleaks
          ./gitleaks detect --source . --redact --verbose --exit-code 1
